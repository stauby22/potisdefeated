name: Update DB Version

on:
  push:
    paths:
      - 'public/PotIsDefeated.db'

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write version file
        run: echo "$(date +%Y%m%d%H%M%S)" > public/db_version.txt

      - name: Commit version file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/db_version.txt
          git commit -m "chore: bump db version timestamp [skip ci]"
          git push
